<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groq AI Chatbot</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: #181a20;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chatbot-container {
            background: #23242a;
            border-radius: 12px;
            box-shadow: 0 2px 12px #0008;
            width: 700px;
            max-width: 98vw;
            height: 500px;
            max-height: 96vh;
            padding: 28px 18px 12px 18px;
            display: flex;
            flex-direction: column;
            align-items: stretch;
        }
        .chatbot-header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
        }
        .chatbot-header {
            text-align: center;
            margin-bottom: 12px;
        }
        .chatbot-title {
            font-size: 1.3rem;
            font-weight: 500;
            color: #fff;
            letter-spacing: 0.5px;
        }
    
        .chatbot-title {
            font-size: 1.6rem;
            font-weight: 600;
            color: #3a6368;
            letter-spacing: 1px;
            text-shadow: 0 2px 8px #00e6ff44;
        }
        .chat-area {
            background: #181a20;
            border-radius: 8px;
            min-height: 250px;
            max-height: 100%;
            flex: 1 1 auto;
            overflow-y: auto;
            padding: 14px 10px;
            margin-bottom: 14px;
        }
        .msg {
            margin: 10px 0;
            display: flex;
            align-items: flex-end;
        }
        .msg.user {
            justify-content: flex-end;
        }
        .msg.bot {
            justify-content: flex-start;
        }
        .msg-bubble {
            padding: 10px 14px;
            border-radius: 12px;
            background: #35363c;
            color: #fff;
            font-size: 1rem;
            max-width: 75%;
            word-break: break-word;
        }
        .msg.user .msg-bubble {
            background: #00e6ff;
            color: #181a20;
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .chatbot-input-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chatbot-input {
            flex: 1;
            padding: 10px 12px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            background: #23242a;
            color: #fff;
            outline: none;
        }
        .chatbot-send-btn {
            background: #00e6ff;
            color: #181a20;
            border: none;
            border-radius: 8px;
            padding: 10px 18px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .chatbot-send-btn:hover {
            background: #3a7bd5;
            color: #fff;
        }
        /* 3D haptic effect */
        .chatbot-container {
            perspective: 800px;
            transform-style: preserve-3d;
            transition: box-shadow 0.2s, transform 0.2s;
        }
        .chatbot-container:active {
            transform: rotateY(2deg) scale(0.98);
            box-shadow: 0 2px 16px #00e6ff77, 0 1.5px 8px #3a7bd577;
        }
    </style>
</head>
<body>
    <div class="chatbot-container">
        <div class="chatbot-header">
            <!-- <div class="chatbot-avatar">🤖</div> -->
            <div class="chatbot-title">Samadhan Setu AI Chatbot</div>
        </div>
        <div class="chat-area" id="chat"></div>
        <form class="chatbot-input-area" id="chatForm">
            <input type="text" class="chatbot-input" id="userInput" placeholder="Type your message..." autocomplete="off" required />
            <button type="submit" class="chatbot-send-btn">Send</button>
        </form>
    </div>
    <script>
        const chat = document.getElementById('chat');
        const form = document.getElementById('chatForm');
        const input = document.getElementById('userInput');

        function addMessage(msg, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${sender}`;
            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            bubble.textContent = msg;
            msgDiv.appendChild(bubble);
            chat.appendChild(msgDiv);
            chat.scrollTop = chat.scrollHeight;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const userMsg = input.value.trim();
            if (!userMsg) return;
            addMessage(userMsg, 'user');
            input.value = '';
            addMessage('...', 'bot');
            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userMsg })
                });
                const data = await res.json();
                // Remove the loading message
                chat.removeChild(chat.lastChild);
                addMessage(data.reply, 'bot');
            } catch (err) {
                chat.removeChild(chat.lastChild);
                addMessage('Error: Could not reach backend', 'bot');
            }
        });
    </script>
</body>
</html>
